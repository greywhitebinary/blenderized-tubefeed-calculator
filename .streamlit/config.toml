# Dietitians-of-Canada-style maroon (author theming request 2026-07-20).
# primaryColor drives the selected-tab indicator, radio buttons,
# checkboxes, and sliders -- everything Streamlit otherwise renders in
# its default red. Requires an app restart to take effect (the theme is
# read at server startup, not per-rerun).
[theme]
primaryColor = "#8A1538"